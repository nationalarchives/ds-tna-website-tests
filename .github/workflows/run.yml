name: Run tests

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Environment to test
        options:
          - production
          - staging
          - develop
        default: "production"
      include-tests:
        type: string
        description: Test tags to run, separated with a pipe "|" (leave blank to run all tests)
        required: false
        default: ""
      exclude-tests:
        type: string
        description: Test tags to exclude, separated with a pipe "|" (@wip is already excluded)
        required: false
        default: ""
      notify-slack-on-pass:
        type: boolean
        description: Send successful test results to Slack
        required: true
        default: true
      notify-slack-on-fail:
        type: boolean
        description: Send test failure results to Slack
        required: true
        default: true
      description:
        type: string
        description: A description to add to the Slack report
        required: false
        default: ""

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        run: |
          npm install
          npx playwright install --with-deps
          npx playwright install-deps
      - name: Get header value
        run: |
          if [[ "${{ inputs.environment }}" == "develop" ]]; then
            echo "TEST_ACCESS_HEADER=${{ secrets.TEST_HEADER_DEV }}" >> $GITHUB_ENV
            echo "TEST_WAGTAIL_API_TOKEN=${{ secrets.TEST_WAGTAIL_API_TOKEN_DEV }}" >> $GITHUB_ENV
          elif [[ "${{ inputs.environment }}" == "staging" ]]; then
            echo "TEST_ACCESS_HEADER=${{ secrets.TEST_HEADER_STAGING }}" >> $GITHUB_ENV
            echo "TEST_WAGTAIL_API_TOKEN=${{ secrets.TEST_WAGTAIL_API_TOKEN_STAGING }}" >> $GITHUB_ENV
          else
            echo "TEST_ACCESS_HEADER=${{ secrets.TEST_HEADER_PROD }}" >> $GITHUB_ENV
            echo "TEST_WAGTAIL_API_TOKEN=${{ secrets.TEST_WAGTAIL_API_TOKEN_PROD }}" >> $GITHUB_ENV
          fi
      - name: Show test configuration
        run: |
          echo "Environment: `${{ inputs.environment }}`" >> $GITHUB_STEP_SUMMARY
          echo "Include: `${{ inputs.include-tests }}`" >> $GITHUB_STEP_SUMMARY
          echo "Exclude: `${{ inputs.exclude-tests }}`" >> $GITHUB_STEP_SUMMARY
          echo "Description: `${{ inputs.description }}`" >> $GITHUB_STEP_SUMMARY
      - name: Run tests
        run: ENVIRONMENT="${{ inputs.environment }}" TEST_ACCESS_HEADER="${{ env.TEST_ACCESS_HEADER }}" TEST_WAGTAIL_API_TOKEN="${{ env.TEST_WAGTAIL_API_TOKEN }}" CI=true npx playwright test --grep "${{ inputs.include-tests }}" --grep-invert "${{ inputs.exclude-tests }}${{ inputs.exclude-tests && '|' }}@wip"
      - name: Report summary
        if: always()
        run: |
          echo "PASS_COUNT=$(jq '(.stats.expected)' test-results.json)" >> "$GITHUB_ENV"
          echo "FAIL_COUNT=$(jq '(.stats.unexpected)' test-results.json)" >> "$GITHUB_ENV"
          echo "SKIP_COUNT=$(jq '(.stats.skipped)' test-results.json)" >> "$GITHUB_ENV"
          echo "FLAKE_COUNT=$(jq '(.stats.flaky)' test-results.json)" >> "$GITHUB_ENV"
          echo "DURATION=$(jq '(.stats.duration/1000|tonumber|floor)' test-results.json)" >> "$GITHUB_ENV"
      - name: Send report to Slack
        if: (success() && inputs.notify-slack-on-pass) || (failure() && inputs.notify-slack-on-fail)
        uses: ./.github/actions/send-slack-report
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          environment: ${{ inputs.environment }}
          included-tests: ${{ inputs.include-tests }}
          excluded-tests: ${{ inputs.exclude-tests }}
          pass-count: ${{ env.PASS_COUNT }}
          fail-count: ${{ env.FAIL_COUNT }}
          skip-count: ${{ env.SKIP_COUNT }}
          flake-count: ${{ env.FLAKE_COUNT }}
          duration: ${{ env.DURATION }}
          description: ${{ inputs.description }}
