name: Run tests for PR against develop

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  contents: read

jobs:
  test-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libgbm1
      - name: Get header value
        run: |
          echo "TEST_ACCESS_HEADER=${{ secrets.TEST_HEADER_DEV }}" >> $GITHUB_ENV
          echo "TEST_WAGTAIL_API_TOKEN=${{ secrets.TEST_WAGTAIL_API_TOKEN_DEV }}" >> $GITHUB_ENV
      - name: Install Node dependencies
        run: npm ci
      - name: Run tests
        run: ENVIRONMENT="develop" TEST_ACCESS_HEADER="${TEST_ACCESS_HEADER}" TEST_WAGTAIL_API_TOKEN="${TEST_WAGTAIL_API_TOKEN}" CI=true npx playwright test --grep-invert "@wip"
